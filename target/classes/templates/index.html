<!DOCTYPE html>
<html>
<head>
    <title>SmartFlow Advanced Traffic System</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ⚠️ Your API key is exposed — keep for now but restrict later -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDky0AFO434gohwpE-dKGS07zkKshI0zMY&callback=initMap" async defer></script>

    <style>
        body { font-family: Arial; background: #eef2f7; margin: 0; }
        h2 { text-align: center; padding: 15px; background: #1e3a8a; color: white; margin: 0; }
        .main { display: flex; padding: 20px; gap: 20px; }

        .left {
            width: 25%; background: white; padding: 20px;
            border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .left input, .left select {
            width: 100%; padding: 10px; margin: 10px 0;
        }

        .right {
            width: 75%; background: white; padding: 20px;
            border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px; border-bottom: 1px solid #ddd; text-align: center;
        }

        th { background: #1e3a8a; color: white; }

        .buttons { margin-top: 15px; display: flex; gap: 10px; }

        button {
            flex: 1; padding: 10px; border: none; cursor: pointer;
            color: white; border-radius: 5px;
        }

        .add { background: green; }
        .refresh { background: blue; }
        .delete { background: red; }
        .process { background: orange; }

        .green { color: green; font-weight: bold; }
        .red { color: red; font-weight: bold; }
        .yellow { color: orange; font-weight: bold; }

        /* SIGNAL */
        .signal-box {
            width: 60px; background: #222; padding: 10px;
            border-radius: 10px; margin-bottom: 15px;
        }

        .light {
            width: 40px; height: 40px; margin: 10px auto;
            border-radius: 50%; background: #555;
        }

        .active.red { background: red; }
        .active.yellow { background: yellow; }
        .active.green { background: limegreen; }

        canvas { margin-top: 20px; }
        #map { height: 300px; margin-top: 20px; }

        /* 🔔 Alert box (NEW) */
        #alertBox {
            margin-bottom: 10px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>

<body>

<h2>🚦 SmartFlow Traffic Management System</h2>

<div class="main">

<div class="left">

    <label>Vehicle ID</label>
    <input id="vehicleId">

    <label>Speed</label>
    <input id="speed">

    <label>Zone</label>
    <input id="zone">

    <label>Status</label>
    <select id="status">
        <option>Green</option>
        <option>Yellow</option>
        <option>Red</option>
    </select>

    <label>
        <input type="checkbox" id="emergency"> Emergency Vehicle
    </label>

    <label>Process Status</label>
    <input id="processStatus" readonly>

    <div class="buttons">
        <button class="process" onclick="processData()">Process</button>
        <button class="add" onclick="addData()">Add</button>
        <button class="refresh" onclick="load()">Refresh</button>
        <button class="delete" onclick="clearTable()">Clear</button>
    </div>

</div>

<div class="right">

    <!-- 🔔 ALERT -->
    <div id="alertBox"></div>

    <!-- 🚦 SIGNAL -->
    <div class="signal-box">
        <div id="redLight" class="light"></div>
        <div id="yellowLight" class="light"></div>
        <div id="greenLight" class="light"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Zone</th>
                <th>Speed</th>
                <th>Status</th>
                <th>Process</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <canvas id="trafficChart"></canvas>
    <div id="map"></div>

</div>
</div>

<script>

let chart, map;

// ✅ UPDATED LOGIC (multi-level)
function processData(){

    let sp = parseInt(document.getElementById('speed').value) || 0;
    let em = document.getElementById('emergency').checked;

    let status = "";

    if(em){
        status = "Priority";
    }
    else if(sp > 120){
        status = "Critical";
    }
    else if(sp > 80){
        status = "Overload";
    }
    else if(sp > 40){
        status = "Moderate";
    }
    else{
        status = "Normal";
    }

    document.getElementById('processStatus').value = status;
}

function addData(){
    const data = {
        location: zone.value,
        vehicleCount: parseInt(speed.value),
        signalStatus: status.value,
        processStatus: processStatus.value
    };

    fetch('/traffic/add', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    }).then(load);
}

function load(){
    fetch('/traffic/all')
    .then(res=>res.json())
    .then(data=>{
        let rows="";
        let overload=[];

        data.forEach(d=>{
            if(d.processStatus==="Overload") overload.push(d.location);

            rows += `<tr>
                <td>${d.id}</td>
                <td>${d.location}</td>
                <td>${d.vehicleCount}</td>
                <td class="${d.signalStatus.toLowerCase()}">${d.signalStatus}</td>
                <td>${d.processStatus}</td>
                <td>${new Date().toLocaleTimeString()}</td>
            </tr>`;
        });

        tableBody.innerHTML = rows;

        renderChart(data);

        if(data.length>0){
            updateSignal(data[data.length-1].signalStatus);
        }

        // ✅ FIXED ALERT (no popup spam)
        document.getElementById("alertBox").innerText =
            overload.length ? "⚠ Overload: " + overload.join(", ") : "";
    });
}

function renderChart(data){
    let zones={};
    data.forEach(d=>zones[d.location]=(zones[d.location]||0)+d.vehicleCount);

    if(chart) chart.destroy();

    chart=new Chart(trafficChart,{
        type:'bar',
        data:{
            labels:Object.keys(zones),
            datasets:[{label:'Traffic',data:Object.values(zones)}]
        }
    });
}

function updateSignal(s){
    redLight.classList.remove("active");
    yellowLight.classList.remove("active");
    greenLight.classList.remove("active");

    if(s==="Red") redLight.classList.add("active","red");
    else if(s==="Yellow") yellowLight.classList.add("active","yellow");
    else greenLight.classList.add("active","green");
}

function clearTable(){
    if(confirm("Delete ALL data permanently?")){
        fetch('/traffic/deleteAll',{method:'DELETE'}).then(load);
    }
}

function initMap(){
    map=new google.maps.Map(document.getElementById("map"),{
        center:{lat:18.5204,lng:73.8567},
        zoom:12
    });
    new google.maps.TrafficLayer().setMap(map);
}

load();

</script>

</body>
</html>
